  - {type: variant, offset: 5774, length: 121, content: 佛告阿難：「汝當受持，為四眾說，莫令斷絕。一切眾生慎身口意，勿生憍慢放逸。奈女往昔時，調戲比丘尼故，今被婬謗。汝當修行身口意業，恒發善願，聞者隨喜信樂受持，莫生誹謗，墮於地獄，餘報畜生，經百千劫，後報為人，貧窮下賤，不聞正法，邪見家生，恒值惡王，身不具足。汝當修行，受持讀誦，盡未來際，常使不絕。」, 宋: '', 元: ''}
